<!DOCTYPE html>
<html>
<head>
<title>AI Coding Mentor</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
    overflow-y:auto;
}

.container{
    width:600px;
    max-width:95%;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
    margin-top:0;
    text-align:center;
}

textarea{
    width:100%;
    height:200px;
    background:#020617;
    color:white;
    border:1px solid #334155;
    padding:12px;
    font-family:monospace;
    border-radius:8px;
    resize:vertical;
    outline:none;
}

textarea:focus{
    border-color:#3b82f6;
}

button{
    margin-top:12px;
    padding:10px 15px;
    background:#3b82f6;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:6px;
    width:100%;
    font-weight:500;
}

button:hover{
    background:#2563eb;
}

button:disabled{
    background:#475569;
    cursor:not-allowed;
}

.response{
    margin-top:20px;
    background:#020617;
    padding:12px;
    white-space:pre-wrap;
    min-height:60px;
    border-radius:8px;
    border:1px solid #334155;
    max-height:300px;
    overflow-y:auto;
}

.loading{
    margin-top:10px;
    color:#38bdf8;
    font-style:italic;
    display:none;
    text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>AI Coding Mentor</h2>

<textarea id="code" placeholder="Paste your code here..."></textarea>

<button id="analyzeBtn" onclick="analyze()">Analyze Code</button>

<div class="loading" id="loading">
Analyzing code... 
</div>

<div class="response" id="result"></div>

</div>

<script>

async function analyze(){

const code = document.getElementById("code").value;
const button = document.getElementById("analyzeBtn");
const loading = document.getElementById("loading");
const result = document.getElementById("result");

button.disabled = true;
loading.style.display = "block";
result.innerText = "";

try{

const response = await fetch("http://127.0.0.1:8000/mentor",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
code:code
})
});

const data = await response.json();

result.innerText = data.mentor_response;

}catch(error){

result.innerText = "Error contacting AI mentor.";

}

loading.style.display = "none";
button.disabled = false;

}

</script>

</body>
</html>
