<!DOCTYPE html>
<html>
<head>
<title>AI Coding Mentor</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
}

.container{
    width:650px;
    max-width:95%;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

h2{
    margin-top:0;
    text-align:center;
}

select{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:6px;
    background:#020617;
    color:white;
    border:1px solid #334155;
}

textarea{
    width:100%;
    height:220px;
    background:#020617;
    color:white;
    border:1px solid #334155;
    padding:12px;
    font-family:monospace;
    border-radius:8px;
    resize:vertical;
    outline:none;
}

textarea:focus{
    border-color:#3b82f6;
}

button{
    margin-top:12px;
    padding:10px 15px;
    background:#3b82f6;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:6px;
    width:100%;
    font-weight:500;
}

button:hover{
    background:#2563eb;
}

button:disabled{
    background:#475569;
    cursor:not-allowed;
}

.loading{
    margin-top:10px;
    color:#38bdf8;
    font-style:italic;
    display:none;
    text-align:center;
}

.response{
    margin-top:20px;
    background:#020617;
    padding:15px;
    border-radius:8px;
    border:1px solid #334155;
    max-height:350px;
    overflow-y:auto;
    line-height:1.6;
}

.response strong{
    color:#60a5fa;
}

.response code{
    background:#1e293b;
    padding:2px 6px;
    border-radius:4px;
    font-size:14px;
}

.response pre{
    background:#020617;
    padding:10px;
    border-radius:6px;
    overflow-x:auto;
}

.error{
    color:#f87171;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>AI Coding Mentor</h2>

<select id="language">
    <option value="c">C</option>
    <option value="cpp">C++</option>
    <option value="python">Python</option>
</select>

<textarea id="code" placeholder="Paste your C code here..."></textarea>

<button id="analyzeBtn" onclick="analyze()">Analyze Code</button>

<div class="loading" id="loading">
Analyzing code...
</div>

<div class="response" id="result"></div>

</div>

<script>

const codeInput = document.getElementById("code");
const languageSelect = document.getElementById("language");

function updatePlaceholder(){
    if(languageSelect.value === "c"){
        codeInput.placeholder = "Paste your C code here...";
    }
    else if(languageSelect.value === "cpp"){
        codeInput.placeholder = "Paste your C++ code here...";
    }
    else if(languageSelect.value === "python"){
        codeInput.placeholder = "Paste your Python code here...";
    }
}

codeInput.addEventListener("input", () => {
    localStorage.setItem("savedCode", codeInput.value);
});

languageSelect.addEventListener("change", () => {
    localStorage.setItem("savedLanguage", languageSelect.value);
    updatePlaceholder();
});

window.onload = () => {
    const savedCode = localStorage.getItem("savedCode");
    const savedLang = localStorage.getItem("savedLanguage");

    if (savedCode) {
        codeInput.value = savedCode;
    }

    if (savedLang) {
        languageSelect.value = savedLang;
    }

    updatePlaceholder();
};

async function analyze(){

    const code = codeInput.value.trim();
    const language = languageSelect.value;

    const button = document.getElementById("analyzeBtn");
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    if(!code){
        result.innerHTML = "<div class='error'>Please enter some code.</div>";
        return;
    }

    button.disabled = true;
    loading.style.display = "block";
    result.innerHTML = "";

    try{

        const response = await fetch("http://127.0.0.1:8000/mentor",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                code:code,
                language:language
            })
        });

        if(!response.ok){
            throw new Error("Server error");
        }

        const data = await response.json();

        result.innerHTML = marked.parse(data.mentor_response);

    }catch(error){
        result.innerHTML = "<div class='error'>Error contacting AI mentor.</div>";
    }

    loading.style.display = "none";
    button.disabled = false;
}

</script>

</body>
</html>
