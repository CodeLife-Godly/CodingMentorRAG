<!DOCTYPE html>
<html>
<head>
<title>AI Coding Mentor</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #fdf2f8);
    color:#0f172a;
    margin:0;
    padding:20px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    min-height:100vh;
}

/* Glass container */
.container{
    width:650px;
    max-width:95%;
    padding:25px;
    border-radius:16px;

    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(12px);

    border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 20px 40px rgba(0,0,0,0.08);
}

h2{
    margin-top:0;
    text-align:center;
    font-weight:600;
    color:#1e293b;
}

/* Inputs */
select{
    width:100%;
    padding:10px;
    margin-bottom:12px;
    border-radius:8px;
    background: rgba(255,255,255,0.7);
    color:#0f172a;
    border:1px solid #dbeafe;
}

textarea{
    width:100%;
    height:220px;
    background: rgba(255,255,255,0.7);
    color:#0f172a;
    border:1px solid #dbeafe;
    padding:12px;
    font-family:monospace;
    border-radius:10px;
    resize:vertical;
    outline:none;
}

textarea:focus{
    border-color:#6366f1;
    box-shadow:0 0 0 2px rgba(99,102,241,0.2);
}

/* Button */
button{
    margin-top:12px;
    padding:11px;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:10px;
    width:100%;
    font-weight:500;

    background: linear-gradient(135deg, #6366f1, #ec4899);
    transition: all 0.2s ease;
}

button:hover{
    transform: translateY(-1px);
    box-shadow:0 10px 20px rgba(99,102,241,0.3);
}

button:disabled{
    background:#94a3b8;
    cursor:not-allowed;
}

/* Loading */
.loading{
    margin-top:10px;
    color:#6366f1;
    font-style:italic;
    display:none;
    text-align:center;
}

/* Response box */
.response{
    margin-top:20px;
    background: rgba(255,255,255,0.65);
    padding:15px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.5);
    max-height:350px;
    overflow-y:auto;
    line-height:1.6;
}

/* Text styling */
.response strong{
    color:#6366f1;
}

/* Code */
.response code{
    background:#e0e7ff;
    padding:2px 6px;
    border-radius:6px;
    font-size:14px;
}

.response pre{
    background:#0f172a;
    color:#e2e8f0;
    padding:12px;
    border-radius:8px;
    overflow-x:auto;
}

/* Error */
.error{
    color:#dc2626;
    text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h2>Bug-Sensei</h2>

<select id="language">
    <option value="c">C</option>
    <option value="cpp">C++</option>
    <option value="python">Python</option>
</select>

<textarea id="code" placeholder="Paste your C code here..."></textarea>

<button id="analyzeBtn" onclick="analyze()">Analyze Code</button>

<div class="loading" id="loading">
Analyzing code...
</div>

<div class="response" id="result"></div>

</div>

<script>

const codeInput = document.getElementById("code");
const languageSelect = document.getElementById("language");

function updatePlaceholder(){
    if(languageSelect.value === "c"){
        codeInput.placeholder = "Paste your C code here...";
    }
    else if(languageSelect.value === "cpp"){
        codeInput.placeholder = "Paste your C++ code here...";
    }
    else if(languageSelect.value === "python"){
        codeInput.placeholder = "Paste your Python code here...";
    }
}

codeInput.addEventListener("input", () => {
    localStorage.setItem("savedCode", codeInput.value);
});

languageSelect.addEventListener("change", () => {
    localStorage.setItem("savedLanguage", languageSelect.value);
    updatePlaceholder();
});

window.onload = () => {
    const savedCode = localStorage.getItem("savedCode");
    const savedLang = localStorage.getItem("savedLanguage");

    if (savedCode) {
        codeInput.value = savedCode;
    }

    if (savedLang) {
        languageSelect.value = savedLang;
    }

    updatePlaceholder();
};

async function analyze(){

    const code = codeInput.value.trim();
    const language = languageSelect.value;

    const button = document.getElementById("analyzeBtn");
    const loading = document.getElementById("loading");
    const result = document.getElementById("result");

    if(!code){
        result.innerHTML = "<div class='error'>Please enter some code.</div>";
        return;
    }

    button.disabled = true;
    loading.style.display = "block";
    result.innerHTML = "";

    try{

        const response = await fetch("http://127.0.0.1:8000/mentor",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                code:code,
                language:language
            })
        });

        if(!response.ok){
            throw new Error("Server error");
        }

        const data = await response.json();

        result.innerHTML = marked.parse(data.mentor_response);

    }catch(error){
        result.innerHTML = "<div class='error'>Error contacting AI mentor.</div>";
    }

    loading.style.display = "none";
    button.disabled = false;
}

</script>

</body>
</html>
